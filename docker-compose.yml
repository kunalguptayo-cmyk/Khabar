services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: newsdash
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d newsdash"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/newsdash
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      PORT: 8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A tasks.pipeline worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/newsdash
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A tasks.pipeline beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/newsdash
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
